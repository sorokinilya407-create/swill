<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SWILL CHAT</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f18;
      color: #e0e0e0;
      font-family: 'Inter', system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      list-style: none;
    }
    #messages li {
      margin-bottom: 0.5rem;
      padding: 0.4rem 0;
      border-bottom: 1px solid #2a2a3a;
    }
    .nick {
      color: #7aa2ff;
      font-weight: bold;
    }
    .time {
      color: #888;
      font-size: 0.7rem;
      margin-left: 0.5rem;
    }
    .text {
      margin-top: 0.2rem;
      word-break: break-word;
    }
    #form {
      display: flex;
      gap: 0.5rem;
      padding: 1rem;
      background: #1a1a28;
      border-top: 1px solid #2f2f44;
    }
    #nick {
      width: 100px;
      background: #0c0c14;
      border: 1px solid #4a4a6a;
      color: #fff;
      padding: 0.6rem;
      border-radius: 8px;
      outline: none;
    }
    #input {
      flex: 1;
      background: #0c0c14;
      border: 1px solid #4a4a6a;
      color: #fff;
      padding: 0.6rem;
      border-radius: 8px;
      outline: none;
    }
    button {
      background: #7aa2ff;
      border: none;
      color: #000;
      font-weight: bold;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover { background: #9bb5ff; }
  </style>
</head>
<body>
  <ul id="messages"></ul>
  <form id="form" onsubmit="return false;">
    <input id="nick" placeholder="Ник" maxlength="20" value="Гость">
    <input id="input" placeholder="Сообщение..." maxlength="300" autocomplete="off">
    <button type="submit">Отправить</button>
  </form>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const messages = document.getElementById('messages');
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const nickInput = document.getElementById('nick');
    
    // Получаем историю при подключении
    socket.on('chat history', (history) => {
      messages.innerHTML = '';
      history.forEach(msg => addMessage(msg));
      window.scrollTo(0, document.body.scrollHeight);
    });
    
    // Получаем новые сообщения
    socket.on('chat message', (msg) => {
      addMessage(msg);
      window.scrollTo(0, document.body.scrollHeight);
    });
    
    function addMessage(msg) {
      const li = document.createElement('li');
      li.innerHTML = `
        <span class="nick">${escapeHtml(msg.nick)}</span>
        <span class="time">${msg.time}</span>
        <div class="text">${escapeHtml(msg.text)}</div>
      `;
      messages.appendChild(li);
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    // Отправка сообщения
    form.addEventListener('submit', () => {
      const text = input.value.trim();
      const nick = nickInput.value.trim() || 'Аноним';
      if (text) {
        socket.emit('chat message', { nick, text });
        input.value = '';
      }
    });
  </script>
</body>
</html>
